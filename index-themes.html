<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Host Services</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/res/styles.css">
  <link rel="stylesheet" href="/res/themes.css">
  <!-- Optional: Preload icons for faster rendering -->
   <link rel="preload" href="/res/icons.svg" as="fetch">
</head>
<body>
  <div>
    <noscript><em><pre>JavaScript disabled. Enable it to use Dark mode</pre></em></noscript>
    <!-- Wrapper for not showing when no JavaScript -->
    <dev class="js-required-div">
      <!-- Wrapper for upper-right alignment -->
      <div class="theme-mode-controls">

        <!--<div>Theme:</div>-->

        <div class="custom-select theme-selector" data-theme-select>
          <div class="custom-select-trigger">Traefik</div>
          <div class="custom-select-options">
            <div class="custom-select-option" data-value="dracula">
              Dracula <span class="checkmark">✓</span>
            </div>
            <div class="custom-select-option" data-value="solarized">
              Solarized <span class="checkmark">✓</span>
            </div>
            <div class="custom-select-option" data-value="traefik">
              Traefik <span class="checkmark">✓</span>
            </div>
            <div class="custom-select-option" data-value="contrast">
              GitHub High Contrast <span class="checkmark">✓</span>
            </div>
          </div>
        </div>

      <!-- Light/dark/auto mode selector -->
      <button type="button" data-testid="theme-switcher" class="theme-indicator mode-control" id="data-mode-toggle" title="Toggle theme mode">
        <!-- Contrast auto icon (shown in auto mode) -->
        <svg id="autoIcon" class="theme-icon" width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="1">
          <use href="/res/icons.svg#autoIcon"></use>
        </svg>
        <!-- Sun icon (shown in light mode) -->
        <svg id="sunIcon" class="theme-icon hidden" stroke="currentColor" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"  height="20" width="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30">
          <use href="/res/icons.svg#sunIcon"></use>
        </svg>
        <!-- Moon icon (shown in dark mode) -->
        <svg id="moonIcon" class="theme-icon hidden" width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <use href="/res/icons.svg#moonIcon"></use>
        </svg>
        <span class="sr-only">Toggle mode</span>
      </button>
    </div>
  </div>

  <div class="container">
    <h1>Host Services</h1>
    <p class="intro">This host serves the following services:</p>

    <div class="services-card">
      <ul class="services-list">
        <li>
          <a href="/404.html">
            <div>
              <span class="service-title">Error page</span>
              <span class="service-desc">Error page supporting themes</span>
            </div>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <script src="/res/scripts.js"></script>
</body>
</html>
